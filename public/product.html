<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Securely load config from backend before Firebase init
(async function() {
  try {
    const res = await fetch('/api/config');
    const data = await res.json();
    window.__FIREBASE_CONFIG__ = data.firebase;
    window.__ZAP_KEY__ = data.zapKey;
  } catch(e) {
    console.error('Config load failed:', e);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — SovitX Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --blue:#1A6BFF;--blue-light:#4F8EFF;--blue-dark:#0A3FCC;
  --bg:#04080F;--bg2:#070D1A;--surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);--text:#F0F4FF;--muted:#7A8BAA;--white:#fff;
  --green:#10b981;--red:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none;min-height:100vh}
.cursor{width:10px;height:10px;background:var(--blue);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .2s,height .2s}
.cursor-ring{width:36px;height:36px;border:1.5px solid rgba(26,107,255,.6);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s,top .12s,width .3s,height .3s}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px}
.wrapper{position:relative;z-index:2}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;padding:0 20px;display:flex;align-items:center;gap:12px;background:rgba(4,8,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);transition:all .2s;flex-shrink:0}
.back-btn:hover{color:var(--white);border-color:rgba(26,107,255,.4)}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--white);text-decoration:none;margin-left:4px}
.topbar-logo span{color:var(--blue)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-btn{width:40px;height:40px;border:1px solid var(--border);background:var(--surface);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .2s;position:relative;font-size:.9rem}
.topbar-btn:hover{border-color:rgba(26,107,255,.5);background:rgba(26,107,255,.1);color:var(--white)}
.cart-count{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--blue);border-radius:50%;font-size:.65rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}

/* MAIN LAYOUT */
.main{padding:84px 20px 60px;max-width:1100px;margin:0 auto}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);margin-bottom:28px;flex-wrap:wrap}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--blue)}
.breadcrumb i{font-size:.6rem}

/* PRODUCT LAYOUT */
.product-layout{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}

/* LEFT */
.product-left{}

/* BANNER */
.product-banner{width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#0a1628,#0d2255);border:1px solid var(--border);margin-bottom:28px;position:relative}
.product-banner img{width:100%;height:100%;object-fit:cover}
.banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;color:rgba(255,255,255,.1)}

/* SCREENSHOTS */
.screenshots-section{margin-bottom:28px}
.screenshots-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--white);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.screenshots-title i{color:var(--blue);font-size:.85rem}
.screenshots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.screenshot-thumb{aspect-ratio:16/9;border-radius:10px;overflow:hidden;cursor:zoom-in;border:1px solid var(--border);background:var(--surface);transition:transform .2s,border-color .2s}
.screenshot-thumb:hover{transform:scale(1.03);border-color:rgba(26,107,255,.4)}
.screenshot-thumb img{width:100%;height:100%;object-fit:cover}

/* DESCRIPTION */
.desc-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.desc-section-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--white);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.desc-section-title i{color:var(--blue)}
.desc-content{font-size:.85rem;color:var(--muted);line-height:1.8}
.desc-content p{margin-bottom:10px}
.desc-content ul{padding-left:18px;margin-bottom:10px}
.desc-content li{margin-bottom:6px}
.desc-content strong{color:var(--text)}

/* TECH TAGS */
.tech-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tech-tag{padding:4px 12px;background:rgba(26,107,255,.08);border:1px solid rgba(26,107,255,.2);border-radius:100px;font-size:.72rem;font-weight:600;color:var(--blue-light);letter-spacing:.3px}

/* RIGHT STICKY PANEL */
.product-panel{position:sticky;top:80px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:16px}
.panel-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;width:fit-content}
.panel-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--white);line-height:1.25;letter-spacing:-.3px}
.panel-short-desc{font-size:.83rem;color:var(--muted);line-height:1.65}
.panel-pricing{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.panel-price{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--blue-light)}
.panel-original{font-size:.95rem;color:var(--muted);text-decoration:line-through}
.panel-disc-badge{padding:4px 10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:100px;font-size:.75rem;font-weight:700;color:var(--green)}
.panel-divider{height:1px;background:var(--border)}
.panel-perks{display:flex;flex-direction:column;gap:9px}
.perk{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--muted)}
.perk i{color:var(--green);width:16px;font-size:.85rem;flex-shrink:0}

/* COUPON */
.coupon-wrap{display:flex;gap:8px}
.coupon-input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s}
.coupon-input::placeholder{color:var(--muted)}
.coupon-input:focus{border-color:rgba(26,107,255,.5)}
.coupon-btn{padding:10px 16px;background:rgba(26,107,255,.15);border:1px solid rgba(26,107,255,.3);border-radius:10px;color:var(--blue-light);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.coupon-btn:hover{background:rgba(26,107,255,.25)}
.coupon-status{font-size:.75rem;margin-top:4px;min-height:16px;transition:color .2s}
.coupon-ok{color:var(--green)}
.coupon-err{color:var(--red)}

/* PAY BUTTON */
.btn-pay{width:100%;padding:15px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;position:relative;overflow:hidden;letter-spacing:.3px}
.btn-pay::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .3s}
.btn-pay:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(26,107,255,.45)}
.btn-pay:hover::before{opacity:1}
.btn-pay:active{transform:translateY(0)}
.btn-pay-price{font-size:.85rem;opacity:.8;font-weight:500}

.btn-demo{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;text-decoration:none}
.btn-demo:hover{border-color:rgba(26,107,255,.4);background:rgba(26,107,255,.06);color:var(--white)}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s}
.lightbox.open{opacity:1;visibility:visible}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 0 60px rgba(0,0,0,.8);object-fit:contain;transition:transform .3s}
.lightbox-close{position:absolute;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1.1rem;transition:background .2s}
.lightbox-close:hover{background:rgba(255,255,255,.2)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1rem;transition:background .2s}
.lightbox-nav:hover{background:rgba(255,255,255,.2)}
.lightbox-prev{left:20px}
.lightbox-next{right:20px}

/* ── PAYMENT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:440px;width:100%;position:relative;animation:modalIn .35s cubic-bezier(.16,1,.3,1) both}
@keyframes modalIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:1px solid var(--border);background:var(--surface);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:color .2s}
.modal-close:hover{color:var(--white)}
.modal-icon{width:60px;height:60px;border-radius:50%;background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--green);margin:0 auto 20px}
.modal-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:8px}
.modal-subtitle{font-size:.83rem;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:22px}
.modal-link-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.modal-link-text{flex:1;font-size:.78rem;color:var(--blue-light);word-break:break-all;font-family:monospace}
.modal-copy-btn{padding:6px 12px;background:rgba(26,107,255,.15);border:1px solid rgba(26,107,255,.3);border-radius:8px;color:var(--blue-light);font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.modal-copy-btn:hover{background:rgba(26,107,255,.3)}
.btn-download{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;text-decoration:none}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(16,185,129,.35)}
.modal-note{font-size:.73rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}

/* ZapUPI handles payment UI */

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:var(--text);z-index:9000;transform:translateY(20px);opacity:0;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast i{font-size:1rem;flex-shrink:0}
.toast.success i{color:#10b981}
.toast.error i{color:#f87171}
.toast.info i{color:var(--blue)}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-aspect{width:100%;aspect-ratio:16/9;border-radius:16px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(26,107,255,.4);border-radius:10px}

@media(max-width:860px){
  .product-layout{grid-template-columns:1fr}
  .product-panel{position:static}
}
@media(max-width:500px){
  .main{padding:78px 14px 50px}
  .screenshots-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<script>
// ── FIREBASE CONFIG ── (same as store.html)
const firebaseConfig = window.__FIREBASE_CONFIG__;
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── ZapUPI Key ──
const ZAP_KEY = window.__ZAP_KEY__;

// ── STATE ──
let product = null;
let screenshots = [];
let lightboxIdx = 0;
let cart = JSON.parse(localStorage.getItem('svx_cart')||'[]');
let finalPrice = 0;

// ── CURSOR ──
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

// ── CART COUNT ──
function updateCartCount(){document.getElementById('cartCount').textContent=cart.length;}
function toggleCart(){window.location.href='store.html';}
updateCartCount();

// ── LOAD PRODUCT ──
function getParam(k){return new URLSearchParams(window.location.search).get(k);}
const productId = getParam('id');
if(!productId){ window.location.href='store.html'; }

async function loadProduct(){
  try{
    const doc = await db.collection('products').doc(productId).get();
    if(!doc.exists){ window.location.href='store.html'; return; }
    product = {id:doc.id,...doc.data()};
    screenshots = product.screenshots||[];
    finalPrice = product.discountPrice || product.price;
    renderProduct();
    document.title = product.title + ' — SovitX Digital';
    document.getElementById('breadcrumbName').textContent = product.title;
    document.getElementById('navLogo').style.display='flex';
  }catch(e){
    console.error(e);
    showToast('Failed to load product','error');
  }
}

function chipClass(b){
  if(!b) return '';
  return {new:'chip-new',popular:'chip-popular',hot:'chip-hot',sale:'chip-sale'}[b.toLowerCase()]||'chip-new';
}

function renderProduct(){
  const dp = product.discountPrice && product.discountPrice < product.price;
  const discPct = dp ? Math.round((1-product.discountPrice/product.price)*100) : 0;

  const bannerHtml = product.banner
    ? `<img src="${product.banner}" alt="${product.title}">`
    : `<div class="banner-placeholder"><i class="fa-solid fa-box"></i></div>`;

  const screenshotsHtml = screenshots.length > 0 ? `
    <div class="screenshots-section">
      <div class="screenshots-title"><i class="fa-solid fa-images"></i> Screenshots (${screenshots.length})</div>
      <div class="screenshots-grid">
        ${screenshots.map((s,i)=>`<div class="screenshot-thumb" onclick="openLightbox(${i})"><img src="${s}" alt="Screenshot ${i+1}" loading="lazy"></div>`).join('')}
      </div>
    </div>` : '';

  const tagsHtml = (product.techTags||[]).length > 0 ? `
    <div class="tech-tags">${product.techTags.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>` : '';

  document.getElementById('productLayout').innerHTML = `
    <div class="product-left" style="animation:fadeIn .5s both">
      <div class="product-banner">${bannerHtml}</div>
      ${screenshotsHtml}
      <div class="desc-section">
        <div class="desc-section-title"><i class="fa-solid fa-align-left"></i> Description</div>
        <div class="desc-content">${product.description ? product.description.replace(/\n/g,'<br>') : '<p>No description provided.</p>'}</div>
        ${tagsHtml}
      </div>
      ${product.requirements ? `
      <div class="desc-section">
        <div class="desc-section-title"><i class="fa-solid fa-list-check"></i> Requirements</div>
        <div class="desc-content">${product.requirements.replace(/\n/g,'<br>')}</div>
      </div>` : ''}
    </div>

    <div class="product-panel" style="animation:fadeIn .5s .1s both">
      ${product.badge?`<span class="panel-badge ${chipClass(product.badge)}">${product.badge}</span>`:''}
      <div class="panel-title">${product.title}</div>
      <div class="panel-short-desc">${product.shortDesc||''}</div>
      <div class="panel-divider"></div>
      <div class="panel-pricing">
        <span class="panel-price">₹${finalPrice.toLocaleString('en-IN')}</span>
        ${dp?`<span class="panel-original">₹${product.price.toLocaleString('en-IN')}</span><span class="panel-disc-badge">${discPct}% OFF</span>`:''}
      </div>
      <div class="panel-perks">
        <div class="perk"><i class="fa-solid fa-bolt"></i> Instant delivery after payment</div>
        <div class="perk"><i class="fa-solid fa-rotate"></i> Lifetime free updates</div>
        <div class="perk"><i class="fa-solid fa-headset"></i> 24/7 support included</div>
        <div class="perk"><i class="fa-solid fa-shield-halved"></i> Secure & verified product</div>
      </div>
      <div class="panel-divider"></div>
      <div>
        <div style="font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Have a Coupon?</div>
        <div class="coupon-wrap">
          <input class="coupon-input" id="couponInput" type="text" placeholder="Enter coupon code">
          <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
        </div>
        <div class="coupon-status" id="couponStatus"></div>
      </div>
      <button class="btn-pay" id="payBtn" onclick="initiatePayment()">
        <i class="fa-solid fa-lock"></i>
        <span>Pay</span>
        <span class="btn-pay-price" id="payBtnPrice">₹${finalPrice.toLocaleString('en-IN')}</span>
      </button>
      ${product.demoLink ? `<a class="btn-demo" href="${product.demoLink}" target="_blank" rel="noopener"><i class="fa-solid fa-desktop"></i> View Live Demo</a>` : ''}
      <div style="font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5">
        <i class="fa-solid fa-shield-halved" style="color:var(--blue);margin-right:4px"></i>
        Secure payment · Instant access after confirmation
      </div>
    </div>`;
}

// ── COUPON LOGIC ──
// Define coupons in your admin panel via Firestore collection "coupons"
// doc: { code:"SAVE10", type:"percent", value:10, active:true }
async function applyCoupon(){
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  const status = document.getElementById('couponStatus');
  if(!code){ status.className='coupon-status coupon-err'; status.textContent='Enter a coupon code.'; return; }
  status.textContent='Checking...'; status.className='coupon-status';
  try{
    const snap = await db.collection('coupons').where('code','==',code).where('active','==',true).get();
    if(snap.empty){ status.className='coupon-status coupon-err'; status.textContent='Invalid or expired coupon.'; return; }
    const coupon = snap.docs[0].data();
    const base = product.discountPrice||product.price;
    if(coupon.type==='percent'){ finalPrice = Math.round(base*(1-coupon.value/100)); status.textContent=`✓ ${coupon.value}% off applied!`; }
    else{ finalPrice = Math.max(1, base-coupon.value); status.textContent=`✓ ₹${coupon.value} off applied!`; }
    status.className='coupon-status coupon-ok';
    document.getElementById('payBtnPrice').textContent='₹'+finalPrice.toLocaleString('en-IN');
    showToast('Coupon applied! 🎉','success');
  }catch(e){ status.className='coupon-status coupon-err'; status.textContent='Error checking coupon.'; }
}

// ── ZAPUPI PAYMENT FLOW ──
ZapUPI.setPaymentCallbacks({
  onSuccess: function(orderId) {
    // Payment confirmed by ZapUPI — save order & show success
    db.collection('orders').add({
      productId:    product.id,
      productTitle: product.title,
      amount:       finalPrice,
      ref:          orderId,
      timestamp:    firebase.firestore.FieldValue.serverTimestamp(),
      status:       'completed'
    });
    showSuccess();
  },
  onFailed: function(orderId) {
    // Show toast error — existing UI pattern
    showToast('Payment failed. Please try again.', 'error');
    db.collection('orders').add({
      productId:    product.id,
      productTitle: product.title,
      amount:       finalPrice,
      ref:          orderId,
      timestamp:    firebase.firestore.FieldValue.serverTimestamp(),
      status:       'failed'
    });
  },
  onTimeout: function(orderId) {
    showToast('Payment timed out. Please retry.', 'error');
    db.collection('orders').add({
      productId:    product.id,
      productTitle: product.title,
      amount:       finalPrice,
      ref:          orderId,
      timestamp:    firebase.firestore.FieldValue.serverTimestamp(),
      status:       'timeout'
    });
  },
});

function initiatePayment(){
  if(!product) return;
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Opening payment...';
  ZapUPI.createOrder(
    {
      zap_key:  ZAP_KEY,
      order_id: 'SVX' + Date.now(),
      amount:   String(finalPrice),
      remark:   product.title.replace(/[^a-zA-Z0-9 ]/g, '').substring(0, 50),
    },
    {
      onResponse: function(paymentUrl, orderId, data) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-lock"></i> Pay <span class="btn-pay-price">₹' + finalPrice.toLocaleString('en-IN') + '</span>';
        ZapUPI.loadPayment(paymentUrl);
      },
      onError: function(err) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-lock"></i> Pay <span class="btn-pay-price">₹' + finalPrice.toLocaleString('en-IN') + '</span>';
        showToast('Order error: ' + err, 'error');
      },
    }
  );
}

function showSuccess(){
  const link = product.downloadLink||product.productLink||'#';
  document.getElementById('successLink').textContent=link;
  document.getElementById('downloadBtn').href=link;
  openModal('successModal');
}

function copyLink(){
  const link=document.getElementById('successLink').textContent;
  navigator.clipboard.writeText(link).then(()=>showToast('Link copied!','success'));
}

// ── MODALS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.getElementById('successModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal('successModal'); });

// ── LIGHTBOX ──
function openLightbox(idx){
  lightboxIdx=idx;
  document.getElementById('lightboxImg').src=screenshots[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e){
  if(!e||e.target===document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
}
function lightboxNav(dir,e){
  e.stopPropagation();
  lightboxIdx=(lightboxIdx+dir+screenshots.length)%screenshots.length;
  document.getElementById('lightboxImg').src=screenshots[lightboxIdx];
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowLeft') lightboxNav(-1,{stopPropagation:()=>{}});
  else if(e.key==='ArrowRight') lightboxNav(1,{stopPropagation:()=>{}});
  else if(e.key==='Escape') closeLightbox();
});

// ── TOAST ──
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  const icon=type==='success'?'fa-circle-check':type==='error'?'fa-circle-xmark':'fa-circle-info';
  t.className=`toast ${type}`;
  t.querySelector('i').className=`fa-solid ${icon}`;
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// ── ANIMATION CSS ──
const s=document.createElement('style');
s.textContent=`@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}`;
document.head.appendChild(s);

// ── INIT ──
loadProduct();
</script>
