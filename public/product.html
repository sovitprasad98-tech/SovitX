<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — SovitX Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://zapupi.com/single-html-web-kit.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--blue:#1A6BFF;--blue-light:#4F8EFF;--blue-dark:#0A3FCC;--bg:#04080F;--bg2:#070D1A;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#F0F4FF;--muted:#7A8BAA;--white:#fff;--green:#10b981;--red:#f87171}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;cursor:none}
.cursor{width:10px;height:10px;background:var(--blue);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen}
.cursor-ring{width:36px;height:36px;border:1.5px solid rgba(26,107,255,.6);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s,top .12s}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px}
.wrapper{position:relative;z-index:2}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;padding:0 20px;display:flex;align-items:center;gap:12px;background:rgba(4,8,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);transition:all .2s}
.back-btn:hover{color:var(--white);border-color:rgba(26,107,255,.4)}
.topbar-right{margin-left:auto}
.topbar-btn{width:40px;height:40px;border:1px solid var(--border);background:var(--surface);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .2s;position:relative}
.topbar-btn:hover{border-color:rgba(26,107,255,.5);background:rgba(26,107,255,.1);color:var(--white)}
.cart-count{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--blue);border-radius:50%;font-size:.65rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.main{padding:84px 20px 60px;max-width:1100px;margin:0 auto}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);margin-bottom:28px;flex-wrap:wrap}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--blue)}
/* STATUS STATES */
.status-box{text-align:center;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.status-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto}
.status-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700}
.status-msg{font-size:.83rem;color:var(--muted);max-width:320px;line-height:1.6;text-align:center}
.status-err .status-icon{background:rgba(248,113,113,.1);border:2px solid rgba(248,113,113,.3);color:var(--red)}
.status-err .status-title{color:var(--red)}
.status-loading .status-icon{background:rgba(26,107,255,.1);border:2px solid rgba(26,107,255,.2);color:var(--blue)}
.status-loading .status-title{color:var(--text)}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-retry{padding:11px 24px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;text-decoration:none}
.btn-retry:hover{background:var(--blue-light);transform:translateY(-1px)}
/* PRODUCT LAYOUT */
.product-layout{display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start}
.product-banner{width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#0a1628,#0d2255);border:1px solid var(--border);margin-bottom:24px}
.product-banner img{width:100%;height:100%;object-fit:cover}
.banner-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;color:rgba(255,255,255,.1)}
.screenshots-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.screenshots-title i{color:var(--blue)}
.screenshots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.ss-thumb{aspect-ratio:16/9;border-radius:10px;overflow:hidden;cursor:zoom-in;border:1px solid var(--border);background:var(--surface);transition:transform .2s,border-color .2s}
.ss-thumb:hover{transform:scale(1.03);border-color:rgba(26,107,255,.4)}
.ss-thumb img{width:100%;height:100%;object-fit:cover}
.desc-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px}
.desc-card-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--white);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.desc-card-title i{color:var(--blue)}
.desc-content{font-size:.85rem;color:var(--muted);line-height:1.8}
.tech-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tech-tag{padding:4px 12px;background:rgba(26,107,255,.08);border:1px solid rgba(26,107,255,.2);border-radius:100px;font-size:.72rem;font-weight:600;color:var(--blue-light)}
/* PANEL */
.product-panel{position:sticky;top:80px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:14px}
.panel-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;width:fit-content}
.chip-new{background:rgba(26,107,255,.15);color:var(--blue-light);border:1px solid rgba(26,107,255,.3)}
.chip-popular{background:rgba(255,170,0,.12);color:#FFB300;border:1px solid rgba(255,170,0,.25)}
.chip-hot{background:rgba(255,60,60,.12);color:#FF6060;border:1px solid rgba(255,60,60,.25)}
.chip-sale{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.panel-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--white);line-height:1.25;letter-spacing:-.3px}
.panel-short{font-size:.83rem;color:var(--muted);line-height:1.65}
.panel-divider{height:1px;background:var(--border)}
.panel-pricing{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.panel-price{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--blue-light)}
.panel-original{font-size:.95rem;color:var(--muted);text-decoration:line-through}
.panel-disc{padding:4px 10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:100px;font-size:.75rem;font-weight:700;color:var(--green)}
.panel-perks{display:flex;flex-direction:column;gap:9px}
.perk{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--muted)}
.perk i{color:var(--green);width:16px;font-size:.85rem}
.coupon-wrap{display:flex;gap:8px}
.coupon-input{flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s}
.coupon-input::placeholder{color:var(--muted)}
.coupon-input:focus{border-color:rgba(26,107,255,.5)}
.coupon-btn{padding:10px 14px;background:rgba(26,107,255,.15);border:1px solid rgba(26,107,255,.3);border-radius:10px;color:var(--blue-light);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.coupon-btn:hover{background:rgba(26,107,255,.25)}
.coupon-status{font-size:.75rem;min-height:16px}
.coupon-ok{color:var(--green)}
.coupon-err{color:var(--red)}
.btn-pay{width:100%;padding:15px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;letter-spacing:.3px}
.btn-pay:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(26,107,255,.45)}
.btn-pay:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-demo{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;text-decoration:none}
.btn-demo:hover{border-color:rgba(26,107,255,.4);background:rgba(26,107,255,.06);color:var(--white)}
.panel-note{font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s}
.lightbox.open{opacity:1;visibility:visible}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
.lightbox-close{position:absolute;top:20px;right:20px;width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1.1rem}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1rem}
.lb-prev{left:20px}
.lb-next{right:20px}
/* SUCCESS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:all .3s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center}
.modal-icon{width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:var(--green);margin:0 auto 18px}
.modal-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:8px}
.modal-sub{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-link-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px;text-align:left}
.modal-link-text{flex:1;font-size:.76rem;color:var(--blue-light);word-break:break-all;font-family:monospace}
.modal-copy-btn{padding:5px 10px;background:rgba(26,107,255,.15);border:1px solid rgba(26,107,255,.3);border-radius:7px;color:var(--blue-light);font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-dl{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:all .2s;margin-bottom:10px}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(16,185,129,.35)}
.modal-note{font-size:.72rem;color:var(--muted);line-height:1.5}
/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:var(--text);z-index:9000;transform:translateY(20px);opacity:0;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success i{color:var(--green)}
.toast.error i{color:var(--red)}
.toast.info i{color:var(--blue)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(26,107,255,.4);border-radius:10px}
@media(max-width:860px){.product-layout{grid-template-columns:1fr}.product-panel{position:static}}
@media(max-width:500px){.main{padding:78px 14px 50px}.screenshots-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-close" onclick="closeLB()"><i class="fa-solid fa-xmark"></i></div>
  <div class="lb-nav lb-prev" onclick="lbNav(-1)"><i class="fa-solid fa-chevron-left"></i></div>
  <img class="lightbox-img" id="lbImg" src="" alt="">
  <div class="lb-nav lb-next" onclick="lbNav(1)"><i class="fa-solid fa-chevron-right"></i></div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon"><i class="fa-solid fa-check"></i></div>
    <div class="modal-title">Payment Successful! 🎉</div>
    <div class="modal-sub">Thank you! Your product is ready.</div>
    <div class="modal-link-box">
      <span class="modal-link-text" id="successLink">#</span>
      <button class="modal-copy-btn" onclick="copyLink()"><i class="fa-solid fa-copy"></i> Copy</button>
    </div>
    <a class="btn-dl" id="dlBtn" href="#" target="_blank"><i class="fa-solid fa-download"></i> Download Product</a>
    <div class="modal-note">Save this link. Check admin panel for order details.</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fa-solid fa-circle-check" id="toastIcon"></i><span id="toastMsg"></span></div>

<!-- TOPBAR -->
<div class="topbar">
  <a href="store.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Shop</a>
  <div class="topbar-right">
    <a href="store.html" class="topbar-btn">
      <i class="fa-solid fa-bag-shopping"></i>
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </div>
</div>

<div class="wrapper">
<div class="main">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <i class="fa-solid fa-chevron-right" style="font-size:.6rem"></i>
    <a href="store.html">Shop</a>
    <i class="fa-solid fa-chevron-right" style="font-size:.6rem"></i>
    <span id="breadcrumbName">Loading...</span>
  </div>
  <div id="productWrap">
    <div class="status-box status-loading">
      <div class="status-icon"><i class="fa-solid fa-spinner spin"></i></div>
      <div class="status-title">Loading product...</div>
      <div class="status-msg">Please wait</div>
    </div>
  </div>
</div>
</div>

<script>
// ── CURSOR ──
const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();

// ── CART COUNT ──
const cart = JSON.parse(localStorage.getItem('svx_cart')||'[]');
document.getElementById('cartCount').textContent = cart.length;

// ── STATE ──
let product = null, screenshots = [], finalPrice = 0, lbIdx = 0;
let db = null, ZAP_KEY = '';

// ── TOAST ──
let toastT;
function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  const icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  document.getElementById('toastIcon').className='fa-solid '+icons[type];
  document.getElementById('toastMsg').textContent=msg;
  t.className='toast show '+type;
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),3500);
}

// ── ERROR UI ──
function showError(msg, detail='') {
  document.getElementById('breadcrumbName').textContent = 'Error';
  document.getElementById('productWrap').innerHTML = `
    <div class="status-box status-err">
      <div class="status-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="status-title">Failed to Load</div>
      <div class="status-msg">${msg}</div>
      ${detail ? `<div style="font-size:.72rem;color:var(--muted);opacity:.6;margin-top:-8px">${detail}</div>` : ''}
      <button class="btn-retry" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> Retry</button>
      <a href="store.html" style="font-size:.8rem;color:var(--muted);text-decoration:none;margin-top:-8px">← Back to Store</a>
    </div>`;
}

// ── RENDER PRODUCT ──
function renderProduct() {
  const dp = product.discountPrice && product.discountPrice < product.price;
  const discPct = dp ? Math.round((1 - product.discountPrice/product.price)*100) : 0;
  const chipMap = {new:'chip-new',popular:'chip-popular',hot:'chip-hot',sale:'chip-sale'};
  const chipClass = product.badge ? chipMap[product.badge.toLowerCase()]||'chip-new' : '';

  const bannerHtml = product.banner
    ? `<img src="${product.banner}" alt="${product.title}">`
    : `<div class="banner-ph"><i class="fa-solid fa-box"></i></div>`;

  const ssHtml = screenshots.length ? `
    <div class="screenshots-title"><i class="fa-solid fa-images"></i> Screenshots (${screenshots.length})</div>
    <div class="screenshots-grid">
      ${screenshots.map((s,i)=>`<div class="ss-thumb" onclick="openLB(${i})"><img src="${s}" loading="lazy" alt="Screenshot ${i+1}"></div>`).join('')}
    </div>` : '';

  const tagsHtml = (product.techTags||[]).length
    ? `<div class="tech-tags">${product.techTags.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>` : '';

  document.getElementById('productWrap').innerHTML = `
    <div class="product-layout">
      <div>
        <div class="product-banner">${bannerHtml}</div>
        ${ssHtml}
        <div class="desc-card">
          <div class="desc-card-title"><i class="fa-solid fa-align-left"></i> Description</div>
          <div class="desc-content">${(product.description||'No description.').replace(/\n/g,'<br>')}</div>
          ${tagsHtml}
        </div>
        ${product.requirements ? `
        <div class="desc-card">
          <div class="desc-card-title"><i class="fa-solid fa-list-check"></i> Requirements</div>
          <div class="desc-content">${product.requirements.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
      </div>
      <div class="product-panel">
        ${product.badge ? `<span class="panel-badge ${chipClass}">${product.badge}</span>` : ''}
        <div class="panel-title">${product.title}</div>
        <div class="panel-short">${product.shortDesc||''}</div>
        <div class="panel-divider"></div>
        <div class="panel-pricing">
          <span class="panel-price">₹${finalPrice.toLocaleString('en-IN')}</span>
          ${dp ? `<span class="panel-original">₹${product.price.toLocaleString('en-IN')}</span><span class="panel-disc">${discPct}% OFF</span>` : ''}
        </div>
        <div class="panel-perks">
          <div class="perk"><i class="fa-solid fa-bolt"></i> Instant delivery after payment</div>
          <div class="perk"><i class="fa-solid fa-rotate"></i> Lifetime free updates</div>
          <div class="perk"><i class="fa-solid fa-headset"></i> 24/7 support included</div>
          <div class="perk"><i class="fa-solid fa-shield-halved"></i> Secure & verified product</div>
        </div>
        <div class="panel-divider"></div>
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Have a Coupon?</div>
          <div class="coupon-wrap">
            <input class="coupon-input" id="couponInput" type="text" placeholder="Enter coupon code">
            <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
          </div>
          <div class="coupon-status" id="couponStatus"></div>
        </div>
        <button class="btn-pay" id="payBtn" onclick="initiatePayment()">
          <i class="fa-solid fa-lock"></i> Pay ₹<span id="payPrice">${finalPrice.toLocaleString('en-IN')}</span>
        </button>
        ${product.demoLink ? `<a class="btn-demo" href="${product.demoLink}" target="_blank" rel="noopener"><i class="fa-solid fa-desktop"></i> View Live Demo</a>` : ''}
        <div class="panel-note"><i class="fa-solid fa-shield-halved" style="color:var(--blue)"></i> Secure payment · Instant access after confirmation</div>
      </div>
    </div>`;
}

// ── COUPON ──
async function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  const status = document.getElementById('couponStatus');
  if (!code) { status.className='coupon-status coupon-err'; status.textContent='Enter a coupon code.'; return; }
  status.className='coupon-status'; status.textContent='Checking...';
  try {
    const snap = await db.collection('coupons').where('code','==',code).where('active','==',true).get();
    if (snap.empty) { status.className='coupon-status coupon-err'; status.textContent='Invalid or expired coupon.'; return; }
    const coupon = snap.docs[0].data();
    const base = product.discountPrice || product.price;
    finalPrice = coupon.type==='percent' ? Math.round(base*(1-coupon.value/100)) : Math.max(1, base-coupon.value);
    status.className='coupon-status coupon-ok';
    status.textContent='✓ '+(coupon.type==='percent' ? coupon.value+'%' : '₹'+coupon.value)+' off applied!';
    document.getElementById('payPrice').textContent = finalPrice.toLocaleString('en-IN');
    showToast('Coupon applied! 🎉','success');
  } catch(e) { status.className='coupon-status coupon-err'; status.textContent='Error: '+e.message; }
}

// ── PAYMENT ──
function initiatePayment() {
  if (!product) return;
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> Opening payment...';
  ZapUPI.createOrder(
    { zap_key: ZAP_KEY, order_id: 'SVX'+Date.now(), amount: String(finalPrice),
      remark: (product.title||'').replace(/[^a-zA-Z0-9 ]/g,'').substring(0,50)||'SovitX Order' },
    { onResponse: function(paymentUrl) {
        btn.disabled=false;
        btn.innerHTML='<i class="fa-solid fa-lock"></i> Pay ₹<span id="payPrice">'+finalPrice.toLocaleString('en-IN')+'</span>';
        ZapUPI.loadPayment(paymentUrl);
      },
      onError: function(err) {
        btn.disabled=false;
        btn.innerHTML='<i class="fa-solid fa-lock"></i> Pay ₹<span id="payPrice">'+finalPrice.toLocaleString('en-IN')+'</span>';
        showToast('Order error: '+err,'error');
      }
    }
  );
}

function showSuccess() {
  const link = product.downloadLink || product.productLink || '#';
  document.getElementById('successLink').textContent = link;
  document.getElementById('dlBtn').href = link;
  document.getElementById('successModal').classList.add('open');
}
function copyLink() {
  navigator.clipboard.writeText(document.getElementById('successLink').textContent)
    .then(()=>showToast('Link copied!','success'));
}

// ── LIGHTBOX ──
function openLB(idx) { lbIdx=idx; document.getElementById('lbImg').src=screenshots[idx]; document.getElementById('lightbox').classList.add('open'); }
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function lbNav(dir) { lbIdx=(lbIdx+dir+screenshots.length)%screenshots.length; document.getElementById('lbImg').src=screenshots[lbIdx]; }
document.addEventListener('keydown',e=>{ if(!document.getElementById('lightbox').classList.contains('open'))return; if(e.key==='ArrowLeft')lbNav(-1); else if(e.key==='ArrowRight')lbNav(1); else if(e.key==='Escape')closeLB(); });
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===document.getElementById('lightbox'))closeLB(); });

// ── MAIN INIT ──
(async function init() {
  try {
    // 1. Get product ID from URL
    const pid = new URLSearchParams(window.location.search).get('id');
    if (!pid) { window.location.href='store.html'; return; }

    // 2. Fetch config from backend
    const res = await fetch('/api/config', { headers: {'X-Requested-With':'SovitXFetch'} });
    if (!res.ok) throw new Error('Backend error: HTTP '+res.status);
    const cfg = await res.json();
    if (!cfg.firebase || !cfg.firebase.apiKey) throw new Error('Invalid config from server');

    // 3. Init Firebase
    ZAP_KEY = cfg.zapKey || '';
    if (!firebase.apps.length) firebase.initializeApp(cfg.firebase);
    db = firebase.firestore();

    // 4. Setup ZapUPI callbacks
    ZapUPI.setPaymentCallbacks({
      onSuccess: function(orderId) {
        db.collection('orders').add({ productId:product.id, productTitle:product.title, amount:finalPrice, ref:orderId, timestamp:firebase.firestore.FieldValue.serverTimestamp(), status:'completed' });
        showSuccess();
      },
      onFailed: function(orderId) {
        showToast('Payment failed. Try again.','error');
        db.collection('orders').add({ productId:product.id, productTitle:product.title, amount:finalPrice, ref:orderId, timestamp:firebase.firestore.FieldValue.serverTimestamp(), status:'failed' });
      },
      onTimeout: function(orderId) {
        showToast('Payment timed out. Retry.','error');
        db.collection('orders').add({ productId:product.id, productTitle:product.title, amount:finalPrice, ref:orderId, timestamp:firebase.firestore.FieldValue.serverTimestamp(), status:'timeout' });
      }
    });

    // 5. Fetch product from Firestore
    const doc = await db.collection('products').doc(pid).get();
    if (!doc.exists) { showError('Product not found.', 'ID: '+pid); return; }

    // 6. Render
    product = { id:doc.id, ...doc.data() };
    screenshots = product.screenshots || [];
    finalPrice = product.discountPrice || product.price || 0;
    document.title = product.title+' — SovitX Digital';
    document.getElementById('breadcrumbName').textContent = product.title;
    renderProduct();

  } catch(e) {
    showError(e.message || 'Something went wrong', 'Check console for details');
  }
})();
</script>
